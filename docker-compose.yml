version: "3.9"

services:
  frontend:
    build:
      context: .
      target: development
    container_name: painel-sispagaer-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
    restart: always

  frontend-prod:
    build:
      context: .
      target: production
    container_name: painel-sispagaer-frontend-prod
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    profiles:
      - production
    restart: unless-stopped
